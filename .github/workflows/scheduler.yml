name: EMS PM Scheduler

on:
  schedule:
    # Runs every day at 20:00 UTC (1:00 AM UTC+5)
    - cron: "0 20 * * *"

  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Scheduler
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: node src/index.js
